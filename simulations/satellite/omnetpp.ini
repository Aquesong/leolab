[General]
network = Satellite
sim-time-limit = 20min
# 约束区域
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 2160m
**.constraintAreaMaxY = 1080m
**.constraintAreaMaxZ = 1000m

[WalkerDelta]
extends = General

*.initRightAscension = 0deg
*.initPhase = 0deg
*.alpha = 52deg
*.altitude = 1400km
*.numSatellites = 48
*.numPlane = 8
*.F = 0

[Communication]
extends = WalkerDelta
*.configurator.config = xml("<config>\
							    <interface hosts='satelliteNode[*]' address='10.0.x.x' netmask='255.255.x.x'/>\
							</config>")
**.datarate = 1Gbps
**.bitrate = 1Gbps

# 降低 ARP 老化引发的周期性时延尖峰
**.arp.cacheTimeout = 3600s
**.arp.retryTimeout = 200ms
**.arp.retryCount = 2

# 降低星地重选频率，减小切换扰动
*.topologyConfigurator.updateInterval = 20s

**.hasDhcp = true
*.satelliteNode[*].dhcp.leaseTime = 1s

*.numGroundHosts = 2

# 应用层配置
*.groundHost[*].numApps = 2
*.groundHost[*].app[0].typename = "UdpSendApp"
*.groundHost[*].app[0].messageLength = 100B
*.groundHost[*].app[0].sendInterval = 1s
*.groundHost[*].app[0].startTime = 10s

*.groundHost[0].app[0].packetName = "UDPData-0"
*.groundHost[0].app[0].destAddresses = "groundHost[1]"
*.groundHost[0].app[0].destPort = 5001
*.groundHost[1].app[0].packetName = "UDPData-1"
*.groundHost[1].app[0].destAddresses = "groundHost[0]"
*.groundHost[1].app[0].destPort = 5000

*.groundHost[*].app[1].typename = "UdpSink"
*.groundHost[0].app[1].localPort = 5000
*.groundHost[1].app[1].localPort = 5001

# 可视化参数
*.visualizer.*.transportRouteVisualizer.displayRoutes = true
*.visualizer.*.transportRouteVisualizer.fadeOutMode = "simulationTime"
*.visualizer.*.transportRouteVisualizer.fadeOutTime = 3s
*.visualizer.*.transportRouteVisualizer.packetFilter = "UDPData*"

[OSPF]
extends = Communication

# 禁用自动路由
*.configurator.addStaticRoutes = false
*.configurator.addSubnetRoutes = false
*.configurator.addDefaultRoutes = false
*.configurator.addDirectRoutes = false

**.arp.typename = "Arp"
**.hasOspf = true

[Dijkstra]
extends = Communication

# 禁用自动路由
*.configurator.addStaticRoutes = false
*.configurator.addSubnetRoutes = false
*.configurator.addDefaultRoutes = false
*.configurator.addDirectRoutes = false

**.hasRoutingAlgorithm = true
**.routingAlgorithm.typename = "DijkstraRouting"

[BellmanFord]
extends = Dijkstra

**.routingAlgorithm.typename = "BellmanFordRouting"

[Trajectory]
extends = General
sim-time-limit = 10h

*.visualizer.canvasVisualizer.mobilityVisualizer.typename = "leolab.visualizer.canvas.mobility.BoundaryAwareMobilityCanvasVisualizer"
*.visualizer.*.mobilityVisualizer.displayMovementTrails = true
*.visualizer.*.mobilityVisualizer.movementTrailLineWidth = 2
*.visualizer.*.mobilityVisualizer.movementTrailLineColor = "white"
*.visualizer.*.mobilityVisualizer.moduleFilter = "**.mobility"
**.mobility.updateInterval = 100min
#*.visualizer.*.mobilityVisualizer.trailLength = 600
*.visualizer.*.mobilityVisualizer.trailLength = 6000
*.visualizer.canvasVisualizer.mobilityVisualizer.boundaryJumpThreshold = 0.5

[Starlink]
extends = Trajectory

*.visualizer.*.mobilityVisualizer.trailLength = 1000
*.visualizer.*.mobilityVisualizer.movementTrailLineWidth = 1
*.visualizer.*.mobilityVisualizer.movementTrailLineColor = "black"

# 仅做轨迹可视化时，关闭大规模 IPv4 地址与路由生成，避免 1296 节点下内存爆炸
*.configurator.assignAddresses = false
*.configurator.addStaticRoutes = false
*.configurator.addDefaultRoutes = false
*.configurator.addSubnetRoutes = false
*.configurator.addDirectRoutes = false
*.configurator.optimizeRoutes = false

# 进一步降低节点协议栈开销
*.numGroundHosts = 0

# 仅看可视化时关闭结果记录，减少内存占用
**.vector-recording = false
**.scalar-recording = false

*.initRightAscension = 0deg
*.initPhase = 0deg
*.alpha = 53deg
*.altitude = 550km
*.numSatellites = 1296
*.numPlane = 72
*.F = 0

[Globalstar]

extends = Trajectory

*.visualizer.*.mobilityVisualizer.trailLength = 1000
*.visualizer.*.mobilityVisualizer.movementTrailLineWidth = 1
*.visualizer.*.mobilityVisualizer.movementTrailLineColor = "black"

# 仅做轨迹可视化时，关闭大规模 IPv4 地址与路由生成，避免 1296 节点下内存爆炸
*.configurator.assignAddresses = false
*.configurator.addStaticRoutes = false
*.configurator.addDefaultRoutes = false
*.configurator.addSubnetRoutes = false
*.configurator.addDirectRoutes = false
*.configurator.optimizeRoutes = false

# 进一步降低节点协议栈开销
*.numGroundHosts = 0

# 仅看可视化时关闭结果记录，减少内存占用
**.vector-recording = false
**.scalar-recording = false

*.initRightAscension = 0deg
*.initPhase = 0deg
*.alpha = 52deg
*.altitude = 1400km
*.numSatellites = 48
*.numPlane = 8
*.F = 0




